kind = "web"
previewPath = "/"
title = "BELKA AI Frontend"
version = "1.0.0"
id = "artifacts/belka-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24404

[services.development]
run = "pnpm --filter @workspace/belka-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/belka-ai", "run", "build" ]
publicDir = "artifacts/belka-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24404"
BASE_PATH = "/"
